name: "workspace"
# display_name: "Human Friendly Name"
tenant: "default"
description: "workspace Vulcan project."

# Optional categorization
tags: []  # e.g. ["marketing", "saas", "analytics"]
terms: []  # e.g. ["glossary.data_product", "glossary.business_intelligence"]

# Metadata (domain, use cases, limitations) - edit as needed
metadata:
  domain: "default"
  use_cases:
    - "Example use case"
  limitations:
    - "Example limitation"

# Owners/users (used for approvals / notifications in some setups) - edit as needed
users:
  - username: "example"
    github_username: "example"
    email: "example@example.com"
    type: "MEMBER"

